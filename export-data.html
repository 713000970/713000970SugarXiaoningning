<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>导出预置数据</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
    textarea { width: 100%; height: 400px; margin: 10px 0; font-family: monospace; font-size: 12px; }
    button { padding: 10px 20px; margin-right: 10px; background: #4f8cff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .info { margin: 10px 0; padding: 10px; background: #e8f5e9; }
  </style>
</head>
<body>
  <h2>导出预置数据</h2>
  <p>从 localStorage 导出数据，格式为 app.js 预置数据格式</p>
  
  <div class="info">
    <strong>localStorage 数据统计：</strong>
    <span id="count">0</span> 条
  </div>
  
  <button onclick="exportToAppJs()">导出为 app.js 格式</button>
  
  <textarea id="output" placeholder="点击导出按钮生成代码..."></textarea>
  
  <script>
    var data = JSON.parse(localStorage.getItem('rule_library_providers') || '[]');
    document.getElementById('count').textContent = data.length;
    
    function exportToAppJs() {
      if (data.length === 0) {
        alert('没有数据可导出');
        return;
      }
      
      var output = '';
      for (var i = 0; i < data.length; i++) {
        var item = data[i];
        output += '    { shop: \'\'' + escape(item.shop) + '\'\', shopname: \'\'\', name: \'' + escape(item.name) + '\', brand: \'' + escape(item.brand) + '\', series: \'' + escape(item.series) + '\', split: \'\'\', pricing: \'\'\', publishTime: \'\'\', specialCase: \'\' },\n';
      }
      
      document.getElementById('output').value = output;
    }
    
    function escape(s) {
      return (s || '').replace(/'/g, '\\\'');
    }
  </script>
</body>
</html>
