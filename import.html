<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>批量导入数据</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
    textarea { width: 100%; height: 300px; margin: 10px 0; }
    button { padding: 10px 20px; background: #4f8cff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
  </style>
</head>
<body>
  <h2>批量导入提供者数据</h2>
  <p>格式：知识店铺|提供者|品牌|系列 （每行一条）</p>
  <textarea id="import-data" placeholder="山东泉之源文化传媒有限公司|山东泉之源文化传媒有限公司|小作家报·读写天下|高考复习阅读与写作"></textarea>
  <button onclick="importData()">导入数据</button>
  <div id="result" class="result" style="display:none;"></div>
  <script>
    function importData() {
      var data = document.getElementById('import-data').value.trim();
      if (!data) return;
      
      var lines = data.split('\n');
      var imported = 0;
      var skipped = 0;
      var existing = JSON.parse(localStorage.getItem('rule_library_providers') || '[]');
      
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        
        var parts = line.split('|');
        if (parts.length < 4) continue;
        
        var shop = parts[0].trim();
        var name = parts[1].trim();
        var brand = parts[2].trim();
        var series = parts[3].trim();
        
        // Check if already exists
        var exists = false;
        for (var j = 0; j < existing.length; j++) {
          if (existing[j].name === name && existing[j].brand === brand && existing[j].series === series) {
            exists = true;
            break;
          }
        }
        
        if (exists) {
          skipped++;
        } else {
          existing.push({
            shop: shop,
            name: name,
            brand: brand,
            series: series,
            split: '',
            pricing: '',
            publishTime: '',
            specialCase: ''
          });
          imported++;
        }
      }
      
      localStorage.setItem('rule_library_providers', JSON.stringify(existing));
      
      var result = document.getElementById('result');
      result.style.display = 'block';
      result.innerHTML = '导入完成！新增: ' + imported + ' 条，跳过重复: ' + skipped + ' 条';
    }
  </script>
</body>
</html>
